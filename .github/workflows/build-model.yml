# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Build model

on: 
  workflow_dispatch:
  push:
    branch:
      - main
    
    
env:
  MAX_EVALS: 10
  DATASET_FOLDER: "StellarClassification"
  
permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.11.5"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow hyperopt
    - name: Run MLflow
      run: |
        mlflow run MLProject --env-manager=local
    - name: Get latest MLflow run_id
      run: |
        RUN_ID=$(ls -td mlruns/0/*/ | grep -oE '[a-f0-9]{32}' | head -n 1)
        echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
        echo "Latest run_id: $RUN_ID"
    - name: Copy artifacts into working directory
      run: |
        mkdir -p ./artifacts
        mlflow artifacts download -r ${{ env.RUN_ID }} -d ./MLProject/artifacts
    - name: Upload artifacts to repo
      run: |
        git add .
        git commit -m "Automated Update: Upload artifacts [skip ci]"
    - name: Build docker image
      run: |
        mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "cc"
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
    - name: Tag Docker Image
      run: |
        docker tag proyekmsmlstarclass ${{ secrets.DOCKER_HUB_USERNAME }}/proyekmsmlstarclass:latest